name: Terraform Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [prod, staging, dev]
        default: prod

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_environment: ${{ github.event.inputs.environment || 'prod' }}
  TF_VAR_artifact_s3_bucket: ${{ vars.ARTIFACT_S3_BUCKET || 'placeholder-bucket' }}
  TF_VAR_notification_channels: ${{ vars.NOTIFICATION_CHANNELS || 'slack' }}
  TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
  TF_VAR_telegram_chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
  TF_VAR_telegram_bot_token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TF_VAR_pagerduty_routing_key: ${{ secrets.PAGERDUTY_ROUTING_KEY }}
  TF_VAR_cross_account_role_arn: ${{ vars.CROSS_ACCOUNT_ROLE_ARN }}

jobs:
  check-config:
    name: Check Deploy Config
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.can-deploy }}
    steps:
      - id: check
        env:
          DEPLOY_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -n "$DEPLOY_ROLE" ]; then
            echo "can-deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can-deploy=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: check-config
    if: needs.check-config.outputs.can-deploy == 'true'
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -detailed-exitcode -out=tfplan -no-color
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          retention-days: 1

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.plan_exitcode == '2'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Init
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  smoke-test:
    name: Smoke Test (spike check)
    runs-on: ubuntu-latest
    needs: apply
    if: needs.apply.result == 'success'
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: Invoke Lambda (spike mode)
        run: |
          FUNCTION_NAME="stackalert-${{ env.TF_VAR_environment }}"
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --payload '{"mode":"spike"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/response.json
          cat /tmp/response.json
          if jq -e '.errorMessage' /tmp/response.json > /dev/null 2>&1; then
            echo "Lambda invocation failed!"
            exit 1
          fi
          echo "Smoke test passed"
