name: Terraform Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check-config:
    name: Check Deploy Config
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.check.outputs.can-deploy }}
    steps:
      - id: check
        env:
          DEPLOY_ROLE: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          if [ -n "$DEPLOY_ROLE" ]; then
            echo "can-deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can-deploy=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: check-config
    if: needs.check-config.outputs.can-deploy == 'true'
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - run: echo "planning"
        id: plan

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.plan_exitcode == '2'
    steps:
      - run: echo "applying"
